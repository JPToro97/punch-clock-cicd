name: Pipeline de Integración Continua PunchClock Pro

# Controla cuándo se ejecutará el pipeline (ante cualquier push o pull request)
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar código del repositorio
        uses: actions/checkout@v3

      - name: Configurar entorno de Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Instalar dependencias del proyecto
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest httpx  # Aseguramos herramientas necesarias para las pruebas

      - name: Ejecutar pruebas unitarias con Pytest
        env:
          PYTHONPATH: .
        run: |
          python -m pytest tests/