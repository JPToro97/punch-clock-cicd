version: '3.8'

services:
  # Container 1: The Database
  db:
    image: postgres:15-alpine
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: supersecretpassword
      POSTGRES_DB: punch_clock
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - app-network

  # Container 2: The FastAPI Backend Application
  web:
    build: .
    container_name: fastapi_app
    restart: always
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://admin:supersecretpassword@db:5432/punch_clock
    depends_on:
      - db
    volumes:
      - .:/app
    networks:
      - app-network

volumes:
  pgdata:

networks:
  app-network:
    driver: bridge