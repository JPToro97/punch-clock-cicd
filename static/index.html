<!DOCTYPE html>
<html>
<head>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">
    <div class="mt-10 bg-white p-6 shadow rounded">
        <h2 class="text-xl font-bold mb-4">Add New Employee</h2>
        <div class="flex gap-2">
            <input type="text" id="newName" pattern="[A-Za-z\s]+" required placeholder="Name (Letters only)">
            <input type="number" id="newBadge" required placeholder="Badge # (Numbers only)">            <button onclick="addEmployee()" class="bg-green-500 text-white p-2 rounded">Add Employee</button>
        </div>
    </div>

    <div class="mt-10 bg-white p-6 shadow rounded">
        <h2 class="text-xl font-bold mb-4">Virtual Scanner</h2>
        <div class="flex gap-2">
            <input type="text" id="scanBadge" placeholder="Enter Badge Number" class="border p-2 rounded">
            <button onclick="sendPunch('check-in')" class="bg-green-600 text-white p-2 rounded">Check-In</button>
            <button onclick="sendPunch('break')" class="bg-yellow-500 text-white p-2 rounded">Break</button>
            <button onclick="sendPunch('check-out')" class="bg-red-600 text-white p-2 rounded">Check-Out</button>
        </div>
    </div>
    <div class="mt-10 bg-white p-6 shadow rounded">
        <h2 class="text-xl font-bold mb-4">Employee History Report</h2>
        <input type="text" id="historyBadge" placeholder="Enter Badge # to view report" class="border p-2 rounded">
        <button onclick="showHistory(document.getElementById('historyBadge').value)" class="bg-purple-500 text-white p-2 rounded">Load Report</button>
        
        <table class="w-full mt-4 text-left">
            <thead>
                <tr><th>Timestamp</th><th>Status</th></tr>
            </thead>
            <tbody id="reportTable">
                </tbody>
        </table>
    </div>
    <div class="mt-10 bg-white p-6 shadow rounded">
    <h2 class="text-xl font-bold mb-4">Employee Management</h2>
    <table class="w-full text-left">
        <thead>
            <tr>
                <th>ID</th><th>Name</th><th>Badge #</th><th>Actions</th>
            </tr>
        </thead>
        <tbody id="employeeTable">
            </tbody>
    </table>
    </div>
    
    <script src="/static/script.js"></script>
</body>
</html>
